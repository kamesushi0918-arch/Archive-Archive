<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archive Archive</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Helvetica', 'Arial', sans-serif;
        background: #ffffff;
        color: #000000;
        overflow-x: hidden;
        overflow-y: auto;
        min-height: 100vh;
        width: 100vw;
        user-select: none;
      }

      #intro-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        transition:
          opacity 1.5s ease-in-out,
          visibility 1.5s;
        pointer-events: none;
      }

      #digging-container {
        position: relative;
        font-size: 18pt;
        font-weight: 400;
        line-height: 1;
        display: inline-block;
      }

      .digging-text {
        white-space: nowrap;
      }

      #digging-bg {
        color: #c0c0c0;
      }

      #digging-fill {
        position: absolute;
        top: 0;
        left: 0;
        color: black;
        overflow: hidden;
        width: 0%;
        transition: width 0.3s ease-out;
      }

      #intro-overlay.fade-out {
        opacity: 0;
        visibility: hidden;
      }

      #container {
        position: relative;
        width: 100%;
        opacity: 0;
        transition: opacity 1.5s ease-in-out;
      }

      #container.visible {
        opacity: 1;
      }

      .archive-link {
        position: absolute;
        display: flex;
        flex-direction: column;
        text-decoration: none;
        color: #000000 !important;
        padding: 10px;
        z-index: 1;
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 1s cubic-bezier(0.2, 0.8, 0.2, 1),
          transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        pointer-events: none;
      }

      .archive-link.revealed {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .url-text {
        font-size: 18pt;
        font-weight: 700;
        line-height: 1.1;
        margin-bottom: 2px;
        word-break: break-all;
        letter-spacing: -0.02em;
      }

      .tag-text {
        font-size: 10pt;
        font-weight: 400;
        color: #999999;
        margin-bottom: 1px;
      }

      .desc-text {
        font-size: 11pt;
        font-weight: 400;
        color: #000000;
        line-height: 1.4;
      }

      .archive-link:hover .url-text {
        color: #c0c0c0;
      }
    </style>
  </head>
  <body>
    <div id="intro-overlay">
      <div id="digging-container">
        <span id="digging-bg" class="digging-text">Archive digging...</span>
        <div id="digging-fill" class="digging-text">Archive digging...</div>
      </div>
    </div>

    <main id="container"></main>

    <script>
      const SHEET_ID = '19uD7rBe4Ic6nIR-0LJ2anEdeWTZKbR9WlcT-g8wzGx4';
      const GID = '729859851';
      const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

      const placedRects = [];
      const fillEl = document.getElementById('digging-fill');

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              const delay = Math.random() * 800;
              setTimeout(() => {
                entry.target.classList.add('revealed');
              }, delay);
              observer.unobserve(entry.target);
            }
          });
        },
        { threshold: 0.1 },
      );

      function isOverlapping(rect, totalHeight) {
        if (
          rect.right > window.innerWidth ||
          rect.bottom > totalHeight ||
          rect.left < 0 ||
          rect.top < 0
        ) {
          return true;
        }
        for (const other of placedRects) {
          if (
            !(
              rect.right < other.left ||
              rect.left > other.right ||
              rect.bottom < other.top ||
              rect.top > other.bottom
            )
          ) {
            return true;
          }
        }
        return false;
      }

      async function initArchive() {
        const intro = document.getElementById('intro-overlay');
        const container = document.getElementById('container');
        const minDuration = 3000;
        const startTime = Date.now();

        try {
          const response = await fetch(CSV_URL);
          const csv = await response.text();
          let rows = csv.split('\n').slice(1);
          rows = rows.sort(() => Math.random() - 0.5);

          const totalRows = rows.length;
          const estimatedHeight = Math.max(
            window.innerHeight * 2,
            totalRows * 220,
          );
          container.style.height = `${estimatedHeight}px`;

          for (let i = 0; i < totalRows; i++) {
            const row = rows[i];
            const colsData = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const rawUrl = colsData[0]
              ? colsData[0].replace(/"/g, '').trim()
              : '';
            const category = colsData[1]
              ? colsData[1].replace(/"/g, '').trim()
              : '';
            const utility = colsData[2]
              ? colsData[2].replace(/"/g, '').trim()
              : '';
            const summary = colsData[3]
              ? colsData[3].replace(/"/g, '').trim()
              : '';

            if (rawUrl) {
              const fullUrl = rawUrl.startsWith('http')
                ? rawUrl
                : `https://${rawUrl}`;
              const displayUrl = rawUrl
                .replace(/^(https?:\/\/)?(www\.)?/, '')
                .split(/[/?#:]/)[0];
              const metaInfo = category + (utility ? ' — ' + utility : '');

              const el = document.createElement('a');
              el.href = fullUrl;
              el.target = '_blank';
              el.className = 'archive-link';
              el.innerHTML = `
                <span class="url-text">${displayUrl}</span>
                <span class="tag-text">${metaInfo}</span>
                <span class="desc-text">${summary}</span>
              `;
              container.appendChild(el);

              const rect = el.getBoundingClientRect();
              let attempts = 0;
              let foundPosition = false;

              while (attempts < 2000) {
                const randomX =
                  Math.random() * (window.innerWidth - rect.width - 60);
                const randomY =
                  Math.random() * (estimatedHeight - rect.height - 60);
                const currentRect = {
                  left: randomX,
                  top: randomY,
                  right: randomX + rect.width,
                  bottom: randomY + rect.height,
                };

                if (!isOverlapping(currentRect, estimatedHeight)) {
                  el.style.left = `${randomX}px`;
                  el.style.top = `${randomY}px`;
                  placedRects.push(currentRect);
                  observer.observe(el);
                  foundPosition = true;
                  break;
                }
                attempts++;
              }
              if (!foundPosition) container.removeChild(el);
            }

            const loadProgress = ((i + 1) / totalRows) * 100;
            const timeElapsed = Date.now() - startTime;
            const timeProgress = (timeElapsed / minDuration) * 100;
            fillEl.style.width = `${Math.min(loadProgress, timeProgress)}%`;

            await new Promise((resolve) => setTimeout(resolve, 15));
          }

          const checkEnd = setInterval(() => {
            const timeElapsed = Date.now() - startTime;
            const timeProgress = Math.min(
              (timeElapsed / minDuration) * 100,
              100,
            );
            fillEl.style.width = `${timeProgress}%`;

            if (timeElapsed >= minDuration) {
              clearInterval(checkEnd);
              intro.classList.add('fade-out');
              container.classList.add('visible');
            }
          }, 50);
        } catch (e) {
          console.error('Archive Error:', e);
          intro.classList.add('fade-out');
        }
      }

      initArchive();
    </script>
  </body>
</html>
