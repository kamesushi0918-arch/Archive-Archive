<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archive Archive</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Helvetica', 'Arial', sans-serif;
        background: #ffffff;
        color: #000000;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
        /* 커서를 전체 화면에서 십자로 고정 */
        cursor: crosshair !important;
      }

      header {
        position: fixed;
        top: 30px;
        left: 30px;
        z-index: 1000;
        pointer-events: none;
      }

      #site-title {
        font-size: 1.5rem;
        font-weight: 900;
        letter-spacing: -0.04em;
        text-transform: uppercase;
      }

      #container {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .archive-link {
        position: absolute;
        display: flex;
        flex-direction: column;
        text-decoration: none;
        color: #000000 !important;
        /* 링크 위에서도 십자 커서 유지 */
        cursor: crosshair !important;
        padding: 10px;
        z-index: 1;
        visibility: hidden;
        transition: opacity 0.2s;
      }

      .url-text {
        font-size: 18pt;
        font-weight: 900;
        line-height: 1.1;
        margin-bottom: 4px;
        word-break: break-all;
      }

      .tag-text {
        font-size: 10pt;
        font-weight: 400;
        color: #999999;
        text-transform: uppercase;
        margin-bottom: 2px;
      }

      .desc-text {
        font-size: 11pt;
        font-weight: 400;
        color: #000000;
      }

      .archive-link:hover {
        opacity: 0.5;
        z-index: 9999;
      }

      .archive-link:hover .url-text {
        color: #c0c0c0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="site-title">Archive Archive</h1>
    </header>

    <main id="container"></main>

    <script>
      const SHEET_ID = '19uD7rBe4Ic6nIR-0LJ2anEdeWTZKbR9WlcT-g8wzGx4';
      const GID = '729859851';
      const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

      const placedRects = [];
      const headerRect = { left: 0, top: 0, right: 350, bottom: 120 };

      function isOverlapping(rect) {
        if (rect.left < headerRect.right && rect.top < headerRect.bottom)
          return true;
        if (rect.right > window.innerWidth || rect.bottom > window.innerHeight)
          return true;

        for (const other of placedRects) {
          if (
            !(
              rect.right < other.left ||
              rect.left > other.right ||
              rect.bottom < other.top ||
              rect.top > other.bottom
            )
          ) {
            return true;
          }
        }
        return false;
      }

      async function initArchive() {
        try {
          const response = await fetch(CSV_URL);
          const csv = await response.text();
          const rows = csv.split('\n').slice(1);
          const container = document.getElementById('container');

          rows.forEach((row) => {
            const colsData = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const url = colsData[0] ? colsData[0].replace(/"/g, '').trim() : '';
            const tags = colsData[1]
              ? colsData[1].replace(/"/g, '').trim()
              : '';
            const desc = colsData[2]
              ? colsData[2].replace(/"/g, '').trim()
              : '';

            if (url && url.startsWith('http')) {
              const el = document.createElement('a');
              el.href = url;
              el.target = '_blank';
              el.className = 'archive-link';

              el.innerHTML = `
                <span class="url-text">${url}</span>
                <span class="tag-text">${tags}</span>
                <span class="desc-text">${desc}</span>
              `;

              container.appendChild(el);

              const rect = el.getBoundingClientRect();
              let attempts = 0;
              let foundPosition = false;

              while (attempts < 150) {
                const randomX =
                  Math.random() * (window.innerWidth - rect.width - 20);
                const randomY =
                  Math.random() * (window.innerHeight - rect.height - 20);

                const currentRect = {
                  left: randomX,
                  top: randomY,
                  right: randomX + rect.width,
                  bottom: randomY + rect.height,
                };

                if (!isOverlapping(currentRect)) {
                  el.style.left = `${randomX}px`;
                  el.style.top = `${randomY}px`;
                  el.style.visibility = 'visible';
                  placedRects.push(currentRect);
                  foundPosition = true;
                  break;
                }
                attempts++;
              }

              if (!foundPosition) {
                container.removeChild(el);
              }
            }
          });
        } catch (e) {
          console.error('Archive Error:', e);
        }
      }

      window.addEventListener('load', initArchive);
    </script>
  </body>
</html>
