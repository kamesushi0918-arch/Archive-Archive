<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archive</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Georgia', serif;
        background: #ffffff;
        overflow: hidden;
        user-select: none;
      }

      #intro-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 5000;
        transition:
          opacity 1.5s ease-in-out,
          visibility 1.5s;
        pointer-events: none;
      }

      #digging-container {
        position: relative;
        font-size: 18pt;
        font-weight: 400;
      }

      #digging-bg {
        color: #c0c0c0;
      }
      #digging-fill {
        position: absolute;
        top: 0;
        left: 0;
        color: black;
        overflow: hidden;
        width: 0%;
        transition: width 0.3s ease-out;
        white-space: nowrap;
      }

      #ui-layer {
        position: fixed;
        top: 14px;
        left: 18px;
        font-size: 1rem;
        letter-spacing: -0.01em;
        color: #000;
        z-index: 1000;
        pointer-events: none;
        opacity: 0.5;
      }

      canvas {
        display: block;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  </head>
  <body>
    <div id="intro-overlay">
      <div id="digging-container">
        <span id="digging-bg">Archive digging...</span>
        <div id="digging-fill">Archive digging...</div>
      </div>
    </div>

    <div id="ui-layer">Use arrow keys to move and stay to open</div>

    <script>
      const SHEET_ID = '19uD7rBe4Ic6nIR-0LJ2anEdeWTZKbR9WlcT-g8wzGx4';
      const GID = '729859851';
      const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

      let scene, camera, renderer, player;
      let moveKeys = {
        ArrowUp: false,
        ArrowDown: false,
        ArrowLeft: false,
        ArrowRight: false,
      };

      let archiveNodes = [];
      let stayStartTime = null;
      let isMoving = false;
      let isLoaded = false;
      let currentTarget = null;
      let isInteractionPaused = false;

      let progressMesh, progressTex, progressCanvas, progressCtx;

      const blockGeometry = new THREE.PlaneGeometry(30, 15);
      const textureCache = {};

      init();
      animate();

      function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const aspect = window.innerWidth / window.innerHeight;
        const d = 50;
        camera = new THREE.OrthographicCamera(
          -d * aspect,
          d * aspect,
          d,
          -d,
          1,
          10000,
        );
        camera.position.set(0, 150, 0);
        camera.lookAt(0, 0, 0);

        scene.add(new THREE.GridHelper(20000, 1600, 0xf0f0f0, 0xf0f0f0));

        player = new THREE.Mesh(
          new THREE.CircleGeometry(0.99, 32),
          new THREE.MeshBasicMaterial({ color: 0x000000 }),
        );
        player.rotation.x = -Math.PI / 2;
        player.position.y = 0.5;
        scene.add(player);

        progressCanvas = document.createElement('canvas');
        progressCanvas.width = 128;
        progressCanvas.height = 128;
        progressCtx = progressCanvas.getContext('2d');
        progressTex = new THREE.CanvasTexture(progressCanvas);

        progressMesh = new THREE.Mesh(
          new THREE.PlaneGeometry(3.96, 3.96),
          new THREE.MeshBasicMaterial({
            map: progressTex,
            transparent: true,
            opacity: 0,
          }),
        );
        progressMesh.rotation.x = -Math.PI / 2;
        progressMesh.position.y = 1.0;
        scene.add(progressMesh);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        window.addEventListener('keydown', (e) => {
          if (e.key in moveKeys) {
            moveKeys[e.key] = true;
            isInteractionPaused = false;
          }
        });
        window.addEventListener('keyup', (e) => {
          if (e.key in moveKeys) moveKeys[e.key] = false;
        });

        fetchData();
      }

      async function fetchData() {
        try {
          const response = await fetch(CSV_URL);
          const csv = await response.text();
          const rows = csv
            .split('\n')
            .slice(1)
            .filter((r) => r.trim());

          const repeat = 60;
          const total = rows.length * repeat;
          const area = 4000;

          const fillEl = document.getElementById('digging-fill');
          const overlayEl = document.getElementById('intro-overlay');

          for (let i = 0; i < total; i++) {
            const rowIndex = i % rows.length;
            const r = rows[rowIndex];
            const x = (Math.random() - 0.5) * area;
            const z = (Math.random() - 0.5) * area;

            let skip = false;
            for (let n of archiveNodes) {
              if (
                Math.abs(x - n.position.x) < 40 &&
                Math.abs(z - n.position.z) < 25
              ) {
                skip = true;
                break;
              }
            }
            if (!skip) createBlock(r, x, z, rowIndex);

            if (i % 200 === 0) {
              fillEl.style.width = (i / total) * 100 + '%';
              await new Promise((res) => setTimeout(res, 1));
            }
          }

          setTimeout(() => {
            overlayEl.style.opacity = '0';
            overlayEl.style.visibility = 'hidden';
            isLoaded = true;
          }, 800);
        } catch (e) {
          console.error(e);
        }
      }

      function createBlock(row, x, z, rowIndex) {
        const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        const url = c[0]?.replace(/"/g, '').trim();
        const cat = c[1]?.replace(/"/g, '').trim();
        const sum = c[3]?.replace(/"/g, '').trim();
        if (!url) return;

        if (!textureCache[rowIndex]) {
          const disp = url
            .replace(/^(https?:\/\/)?(www\.)?/, '')
            .split(/[/?#:]/)[0]
            .toLowerCase();

          const canvas = document.createElement('canvas');
          canvas.width = 2400;
          canvas.height = 1200;
          const ctx = canvas.getContext('2d');

          ctx.font = '400 144pt Georgia';
          ctx.fillStyle = 'black';
          ctx.fillText(disp, 80, 200);

          ctx.font = '400 80pt Georgia';
          ctx.fillStyle = '#999999';
          ctx.fillText(cat.toLowerCase(), 88, 340);

          ctx.font = '400 88pt Georgia';
          ctx.fillStyle = 'black';

          const words = (sum || '').toLowerCase().split(' ');
          let line = '';
          let y = 480;
          for (let w of words) {
            let t = line + w + ' ';
            if (ctx.measureText(t).width > 2200 && line.length > 0) {
              ctx.fillText(line, 88, y);
              line = w + ' ';
              y += 112;
            } else {
              line = t;
            }
          }
          ctx.fillText(line, 88, y);

          const tex = new THREE.CanvasTexture(canvas);
          tex.minFilter = THREE.LinearFilter;
          tex.anisotropy = renderer.capabilities.getMaxAnisotropy();

          textureCache[rowIndex] = tex;
        }

        const block = new THREE.Mesh(
          blockGeometry,
          new THREE.MeshBasicMaterial({
            map: textureCache[rowIndex],
            transparent: true,
          }),
        );

        block.position.set(x, 0.2, z);
        block.rotation.x = -Math.PI / 2;

        block.userData = {
          url: url.startsWith('http') ? url : 'https://' + url,
          targetScale: 1.0,
          currentScale: 1.0,
          targetOpacity: 1.0,
          currentOpacity: 1.0,
        };
        scene.add(block);
        archiveNodes.push(block);
      }

      function drawProgress(r) {
        progressCtx.clearRect(0, 0, 128, 128);
        if (r > 0) {
          progressCtx.beginPath();
          progressCtx.lineWidth = 14;
          progressCtx.strokeStyle = '#000000';
          progressCtx.arc(
            64,
            64,
            52,
            -Math.PI / 2,
            -Math.PI / 2 + Math.PI * 2 * r,
          );
          progressCtx.stroke();
        }
        progressTex.needsUpdate = true;
      }

      function animate() {
        requestAnimationFrame(animate);
        if (!isLoaded) return;

        const s = 1.7;
        isMoving = false;

        if (moveKeys.ArrowUp) {
          player.position.z -= s;
          isMoving = true;
        }
        if (moveKeys.ArrowDown) {
          player.position.z += s;
          isMoving = true;
        }
        if (moveKeys.ArrowLeft) {
          player.position.x -= s;
          isMoving = true;
        }
        if (moveKeys.ArrowRight) {
          player.position.x += s;
          isMoving = true;
        }

        camera.position.set(player.position.x, 150, player.position.z);
        progressMesh.position.set(player.position.x, 1.0, player.position.z);

        updateInteraction();

        // 불필요한 매 프레임 업데이트 방지 (값의 차이가 있을 때만 렌더링 반영)
        for (let node of archiveNodes) {
          const u = node.userData;
          if (
            Math.abs(u.targetScale - u.currentScale) > 0.001 ||
            Math.abs(u.targetOpacity - u.currentOpacity) > 0.001
          ) {
            u.currentScale += (u.targetScale - u.currentScale) * 0.15;
            node.scale.set(u.currentScale, u.currentScale, 1);

            u.currentOpacity += (u.targetOpacity - u.currentOpacity) * 0.15;
            node.material.opacity = u.currentOpacity;
          }
        }

        renderer.render(scene, camera);
      }

      function updateInteraction() {
        let target = null;
        for (let n of archiveNodes) {
          if (player.position.distanceTo(n.position) < 14) {
            target = n;
            break;
          }
        }

        if (isMoving || !target || isInteractionPaused) {
          // 전체 블록을 무한히 초기화하던 악성 로직 제거 -> 활성화된 타겟만 초기화
          if (currentTarget) {
            currentTarget.userData.targetScale = 1.0;
            currentTarget.userData.targetOpacity = 1.0;
            currentTarget = null;
          }
          stayStartTime = null;
          progressMesh.material.opacity = 0;
          return;
        }

        const now = Date.now();
        if (!stayStartTime) {
          stayStartTime = now;
          currentTarget = target;
          progressMesh.material.opacity = 1;
        } else if (currentTarget !== target) {
          currentTarget.userData.targetScale = 1.0;
          currentTarget.userData.targetOpacity = 1.0;
          currentTarget = target;
          stayStartTime = now;
        }

        const elapsed = (now - stayStartTime) / 1000;
        const ratio = Math.min(elapsed / 3.0, 1.0);

        drawProgress(ratio);

        if (currentTarget) {
          currentTarget.userData.targetScale = 1.1;
          currentTarget.userData.targetOpacity = 1.0 - 0.5 * ratio;
        }

        if (elapsed >= 3.0) {
          window.open(currentTarget.userData.url, '_blank');
          currentTarget.userData.targetScale = 1.0;
          currentTarget.userData.targetOpacity = 1.0;
          stayStartTime = null;
          currentTarget = null;
          progressMesh.material.opacity = 0;
          isInteractionPaused = true;
        }
      }
    </script>
  </body>
</html>
