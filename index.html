<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archive</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Georgia', serif;
        background: #000000;
        overflow: hidden;
        user-select: none;
      }

      #intro-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 5000;
        transition:
          opacity 1.5s ease-in-out,
          visibility 1.5s;
        pointer-events: none;
      }

      #digging-container {
        position: relative;
        font-size: 18pt;
        font-weight: 400;
      }

      #digging-bg {
        color: #c0c0c0;
      }

      #digging-fill {
        position: absolute;
        top: 0;
        left: 0;
        color: black;
        overflow: hidden;
        width: 0%;
        transition: width 0.3s ease-out;
        white-space: nowrap;
      }

      #ui-layer {
        position: fixed;
        top: 14px;
        left: 18px;
        font-size: 1rem;
        letter-spacing: -0.01em;
        color: #fff;
        z-index: 1000;
        pointer-events: none;
        opacity: 0.5;
        mix-blend-mode: difference;
      }

      #minimap {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 200px;
        height: 200px;
        background: #000000;
        border: 1px solid #333333;
        z-index: 1000;
        pointer-events: none;
        overflow: hidden;
      }

      canvas {
        display: block;
      }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  </head>

  <body>
    <div id="intro-overlay">
      <div id="digging-container">
        <span id="digging-bg">Archive digging...</span>
        <div id="digging-fill">Archive digging...</div>
      </div>
    </div>

    <div id="ui-layer">Use arrow keys to move and stay to open</div>

    <canvas id="minimap" width="200" height="200"></canvas>

    <script>
      const SHEET_ID = '19uD7rBe4Ic6nIR-0LJ2anEdeWTZKbR9WlcT-g8wzGx4';
      const GID = '729859851';
      const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

      let scene, camera, renderer, player;
      let moveKeys = {
        ArrowUp: false,
        ArrowDown: false,
        ArrowLeft: false,
        ArrowRight: false,
      };

      let mainWorldNodes = [];
      let mapWorldNodes = [];
      let activeNodes = mainWorldNodes;

      let stayStartTime = null;
      let isMoving = false;
      let isLoaded = false;
      let currentTarget = null;
      let isInteractionPaused = false;

      let progressMesh, progressTex, progressCanvas, progressCtx;
      const blockGeometry = new THREE.PlaneGeometry(30, 15);
      const textureCache = {};

      const minimapCtx = document.getElementById('minimap').getContext('2d');

      const anchors = {
        art: { x: -245, z: -140 },
        tech: { x: 315, z: -35 },
        archive: { x: -140, z: 175 },
        design: { x: 175, z: 140 },
        map: { x: 0, z: 0 },
      };

      const mainCoords = [
        [-392, -73],
        [-343, -196],
        [-245, -269],
        [-147, -318],
        [-24, -367],
        [122, -367],
        [294, -343],
        [416, -245],
        [465, -147],
        [441, 0],
        [367, 98],
        [318, 147],
        [269, 269],
        [220, 318],
        [171, 220],
        [122, 171],
        [73, 294],
        [24, 171],
        [-73, 147],
        [-122, 245],
        [-220, 269],
        [-245, 171],
        [-318, 122],
        [-392, 49],
      ];

      const mapCoords = [
        [150, 0],
        [105, 105],
        [0, 150],
        [-105, 105],
        [-150, 0],
        [-105, -105],
        [0, -150],
        [105, -105],
      ];

      let activePolygon = mainCoords;
      let mainFloorMesh, mapFloorMesh;

      function pointInPolygon(point, vs) {
        let x = point[0],
          y = point[1];
        let inside = false;
        for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
          let xi = vs[i][0],
            yi = vs[i][1];
          let xj = vs[j][0],
            yj = vs[j][1];
          let intersect =
            yi > y != yj > y && x < ((xj - xi) * (y - yi)) / (yj - yi) + xi;
          if (intersect) inside = !inside;
        }
        return inside;
      }

      function isBoxInPolygon(x, z, vs) {
        const w = 18;
        const h = 10;
        const points = [
          [x - w, z - h],
          [x + w, z - h],
          [x + w, z + h],
          [x - w, z + h],
          [x, z - h],
          [x, z + h],
          [x - w, z],
          [x + w, z],
          [x, z],
        ];
        for (let p of points) {
          if (!pointInPolygon(p, vs)) return false;
        }
        return true;
      }

      function isPlayerInPolygon(x, z, vs) {
        const r = 1.5;
        const points = [
          [x - r, z - r],
          [x + r, z - r],
          [x + r, z + r],
          [x - r, z + r],
          [x, z],
        ];
        for (let p of points) {
          if (!pointInPolygon(p, vs)) return false;
        }
        return true;
      }

      init();
      animate();

      function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const aspect = window.innerWidth / window.innerHeight;
        const d = 50;
        camera = new THREE.OrthographicCamera(
          -d * aspect,
          d * aspect,
          d,
          -d,
          1,
          10000,
        );
        camera.position.set(0, 150, 0);
        camera.lookAt(0, 0, 0);

        const mainShape = new THREE.Shape();
        mainShape.moveTo(mainCoords[0][0], -mainCoords[0][1]);
        for (let i = 1; i < mainCoords.length; i++) {
          mainShape.lineTo(mainCoords[i][0], -mainCoords[i][1]);
        }
        mainShape.closePath();
        mainFloorMesh = new THREE.Mesh(
          new THREE.ShapeGeometry(mainShape),
          new THREE.MeshBasicMaterial({ color: 0xffffff }),
        );
        mainFloorMesh.rotation.x = -Math.PI / 2;
        mainFloorMesh.position.y = -0.1;
        scene.add(mainFloorMesh);

        const mapShape = new THREE.Shape();
        mapShape.moveTo(mapCoords[0][0], -mapCoords[0][1]);
        for (let i = 1; i < mapCoords.length; i++) {
          mapShape.lineTo(mapCoords[i][0], -mapCoords[i][1]);
        }
        mapShape.closePath();
        mapFloorMesh = new THREE.Mesh(
          new THREE.ShapeGeometry(mapShape),
          new THREE.MeshBasicMaterial({ color: 0xffffff }),
        );
        mapFloorMesh.rotation.x = -Math.PI / 2;
        mapFloorMesh.position.y = -0.1;
        mapFloorMesh.visible = false;
        scene.add(mapFloorMesh);

        player = new THREE.Mesh(
          new THREE.CircleGeometry(0.99, 32),
          new THREE.MeshBasicMaterial({ color: 0x000000 }),
        );
        player.rotation.x = -Math.PI / 2;
        player.position.y = 0.5;
        scene.add(player);

        progressCanvas = document.createElement('canvas');
        progressCanvas.width = 128;
        progressCanvas.height = 128;
        progressCtx = progressCanvas.getContext('2d');
        progressTex = new THREE.CanvasTexture(progressCanvas);

        progressMesh = new THREE.Mesh(
          new THREE.PlaneGeometry(3.96, 3.96),
          new THREE.MeshBasicMaterial({
            map: progressTex,
            transparent: true,
            opacity: 0,
          }),
        );
        progressMesh.rotation.x = -Math.PI / 2;
        progressMesh.position.y = 1.0;
        scene.add(progressMesh);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        window.addEventListener('keydown', (e) => {
          if (e.key in moveKeys) {
            moveKeys[e.key] = true;
            isInteractionPaused = false;
          }
        });
        window.addEventListener('keyup', (e) => {
          if (e.key in moveKeys) moveKeys[e.key] = false;
        });

        createPortals();
        fetchData();
      }

      function createPortals() {
        const portalGeo = new THREE.CircleGeometry(5, 32);
        const portalMat = new THREE.MeshBasicMaterial({
          color: 0x000000,
          transparent: true,
          opacity: 0.5,
        });

        const portalToMap = new THREE.Mesh(portalGeo, portalMat);
        portalToMap.rotation.x = -Math.PI / 2;
        portalToMap.position.set(0, 0.1, -40);
        portalToMap.userData = {
          isPortal: true,
          dest: 'map',
          targetScale: 0.5,
          currentScale: 0.5,
          targetOpacity: 0.5,
          currentOpacity: 0.5,
        };
        scene.add(portalToMap);
        mainWorldNodes.push(portalToMap);

        const portalToMain = new THREE.Mesh(portalGeo, portalMat);
        portalToMain.rotation.x = -Math.PI / 2;
        portalToMain.position.set(0, 0.1, -40);
        portalToMain.userData = {
          isPortal: true,
          dest: 'main',
          targetScale: 0.5,
          currentScale: 0.5,
          targetOpacity: 0.5,
          currentOpacity: 0.5,
        };
        portalToMain.visible = false;
        scene.add(portalToMain);
        mapWorldNodes.push(portalToMain);
      }

      async function fetchData() {
        try {
          const response = await fetch(CSV_URL);
          const csv = await response.text();
          const rows = csv
            .split('\n')
            .slice(1)
            .filter((r) => r.trim());

          const total = rows.length;
          const fillEl = document.getElementById('digging-fill');
          const overlayEl = document.getElementById('intro-overlay');

          let categoryCounts = {};

          for (let i = 0; i < total; i++) {
            const r = rows[i];

            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const cat = c[1]?.replace(/"/g, '').trim().toLowerCase() || '';

            const isMapCategory = /\bmap\b/.test(cat);
            const targetArray = isMapCategory ? mapWorldNodes : mainWorldNodes;
            const targetPoly = isMapCategory ? mapCoords : mainCoords;

            const tags = cat.split(',').map((t) => t.trim());
            let targetX = 0,
              targetZ = 0,
              anchorCount = 0;

            tags.forEach((t) => {
              if (anchors[t]) {
                targetX += anchors[t].x;
                targetZ += anchors[t].z;
                anchorCount++;
              }
            });

            if (anchorCount > 0) {
              targetX /= anchorCount;
              targetZ /= anchorCount;
            }

            let key =
              targetX + '_' + targetZ + '_' + (isMapCategory ? 'map' : 'main');
            if (!categoryCounts[key]) categoryCounts[key] = 1;

            let x, z;
            let placed = false;
            let attempts = 0;

            while (!placed && attempts < 1000) {
              let n = categoryCounts[key];
              let angle = n * 2.39996;
              let radius = (isMapCategory ? 25 : 35) * Math.sqrt(n);

              x = targetX + Math.cos(angle) * radius;
              z = targetZ + Math.sin(angle) * radius;
              categoryCounts[key]++;
              attempts++;

              if (isBoxInPolygon(x, z, targetPoly)) {
                let overlap = false;

                if (Math.abs(x) < 40 && Math.abs(z + 40) < 30) overlap = true;

                if (!overlap) {
                  for (let n of targetArray) {
                    if (
                      Math.abs(x - n.position.x) < 32 &&
                      Math.abs(z - n.position.z) < 18
                    ) {
                      overlap = true;
                      break;
                    }
                  }
                }

                if (!overlap) placed = true;
              }
            }

            if (placed) {
              createBlock(r, x, z, i, targetArray, cat, isMapCategory);
            }

            if (i % 10 === 0) {
              fillEl.style.width = (i / total) * 100 + '%';
              await new Promise((res) => setTimeout(res, 1));
            }
          }

          setTimeout(() => {
            overlayEl.style.opacity = '0';
            overlayEl.style.visibility = 'hidden';
            isLoaded = true;
          }, 800);
        } catch (e) {
          console.error(e);
        }
      }

      function createBlock(
        row,
        x,
        z,
        rowIndex,
        targetArray,
        cat,
        isMapCategory,
      ) {
        const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        const url = c[0]?.replace(/"/g, '').trim();
        const meta = c[2]?.replace(/"/g, '').trim() || '';
        const sum = c[3]?.replace(/"/g, '').trim();

        if (!url) return;

        if (!textureCache[rowIndex]) {
          const disp = url
            .replace(/^(https?:\/\/)?(www\.)?/, '')
            .split(/[/?#:]/)[0]
            .toLowerCase();
          const canvas = document.createElement('canvas');
          canvas.width = 2400;
          canvas.height = 1200;
          const ctx = canvas.getContext('2d');

          ctx.font = '400 90pt Georgia';
          ctx.fillStyle = '#666666';
          ctx.fillText(meta.toUpperCase(), 80, 120);

          ctx.font = '400 144pt Georgia';
          ctx.fillStyle = 'black';
          ctx.fillText(disp, 80, 280);

          ctx.font = '400 80pt Georgia';
          ctx.fillStyle = '#999999';
          ctx.fillText(cat, 88, 420);

          ctx.font = '400 88pt Georgia';
          ctx.fillStyle = 'black';

          const words = (sum || '').toLowerCase().split(' ');
          let line = '';
          let y = 560;

          for (let w of words) {
            let t = line + w + ' ';
            if (ctx.measureText(t).width > 2200 && line.length > 0) {
              ctx.fillText(line, 88, y);
              line = w + ' ';
              y += 112;
            } else {
              line = t;
            }
          }
          ctx.fillText(line, 88, y);

          const tex = new THREE.CanvasTexture(canvas);
          tex.minFilter = THREE.LinearFilter;
          tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
          textureCache[rowIndex] = tex;
        }

        const block = new THREE.Mesh(
          blockGeometry,
          new THREE.MeshBasicMaterial({
            map: textureCache[rowIndex],
            transparent: true,
          }),
        );

        block.position.set(x, 0.2, z);
        block.rotation.x = -Math.PI / 2;
        block.userData = {
          url: url.startsWith('http') ? url : 'https://' + url,
          targetScale: 1.0,
          currentScale: 1.0,
          targetOpacity: 1.0,
          currentOpacity: 1.0,
          isPortal: false,
        };

        if (isMapCategory) block.visible = false;

        scene.add(block);
        targetArray.push(block);
      }

      function drawProgress(r) {
        progressCtx.clearRect(0, 0, 128, 128);
        if (r > 0) {
          progressCtx.beginPath();
          progressCtx.lineWidth = 14;
          progressCtx.strokeStyle = '#000000';
          progressCtx.arc(
            64,
            64,
            52,
            -Math.PI / 2,
            -Math.PI / 2 + Math.PI * 2 * r,
          );
          progressCtx.stroke();
        }
        progressTex.needsUpdate = true;
      }

      function drawMinimap() {
        const mapSize = 200;
        const centerOffset = mapSize / 2;

        const viewRadius = 500;
        const scale = mapSize / (viewRadius * 2);

        minimapCtx.clearRect(0, 0, mapSize, mapSize);

        minimapCtx.save();

        minimapCtx.translate(centerOffset, centerOffset);
        minimapCtx.scale(scale, scale);
        minimapCtx.translate(-player.position.x, -player.position.z);

        minimapCtx.fillStyle = '#ffffff';
        minimapCtx.beginPath();
        minimapCtx.moveTo(activePolygon[0][0], activePolygon[0][1]);
        for (let i = 1; i < activePolygon.length; i++) {
          minimapCtx.lineTo(activePolygon[i][0], activePolygon[i][1]);
        }
        minimapCtx.fill();

        activeNodes.forEach((n) => {
          let nx = n.position.x;
          let nz = n.position.z;

          if (n.userData.isPortal) {
            minimapCtx.fillStyle = '#ff0000';
            minimapCtx.fillRect(nx - 15, nz - 15, 30, 30);
          } else {
            minimapCtx.fillStyle = '#000000';
            minimapCtx.fillRect(nx - 5, nz - 5, 10, 10);
          }
        });

        minimapCtx.restore();

        minimapCtx.fillStyle = '#ff0000';
        minimapCtx.fillRect(centerOffset - 3, centerOffset - 3, 6, 6);
      }

      function switchWorld(dest) {
        activeNodes.forEach((n) => (n.visible = false));

        if (dest === 'map') {
          activeNodes = mapWorldNodes;
          activePolygon = mapCoords;
          mainFloorMesh.visible = false;
          mapFloorMesh.visible = true;
        } else {
          activeNodes = mainWorldNodes;
          activePolygon = mainCoords;
          mainFloorMesh.visible = true;
          mapFloorMesh.visible = false;
        }

        activeNodes.forEach((n) => (n.visible = true));

        player.position.set(0, 0.5, 0);
        camera.position.set(0, 150, 0);
      }

      function animate() {
        requestAnimationFrame(animate);
        if (!isLoaded) return;

        const s = 1.7;
        isMoving = false;

        let nx = player.position.x;
        let nz = player.position.z;
        let attemptedMove = false;

        if (moveKeys.ArrowUp) {
          nz -= s;
          attemptedMove = true;
        }
        if (moveKeys.ArrowDown) {
          nz += s;
          attemptedMove = true;
        }
        if (moveKeys.ArrowLeft) {
          nx -= s;
          attemptedMove = true;
        }
        if (moveKeys.ArrowRight) {
          nx += s;
          attemptedMove = true;
        }

        if (attemptedMove) {
          if (isPlayerInPolygon(nx, nz, activePolygon)) {
            player.position.x = nx;
            player.position.z = nz;
            isMoving = true;
          } else if (isPlayerInPolygon(nx, player.position.z, activePolygon)) {
            player.position.x = nx;
            isMoving = true;
          } else if (isPlayerInPolygon(player.position.x, nz, activePolygon)) {
            player.position.z = nz;
            isMoving = true;
          }
        }

        camera.position.set(player.position.x, 150, player.position.z);
        progressMesh.position.set(player.position.x, 1.0, player.position.z);

        updateInteraction();

        for (let node of activeNodes) {
          const u = node.userData;
          if (
            Math.abs(u.targetScale - u.currentScale) > 0.001 ||
            Math.abs(u.targetOpacity - u.currentOpacity) > 0.001
          ) {
            u.currentScale += (u.targetScale - u.currentScale) * 0.15;
            node.scale.set(u.currentScale, u.currentScale, 1);
            u.currentOpacity += (u.targetOpacity - u.currentOpacity) * 0.15;
            node.material.opacity = u.currentOpacity;
          }
        }

        drawMinimap();
        renderer.render(scene, camera);
      }

      function updateInteraction() {
        let target = null;

        for (let n of activeNodes) {
          const interactDist = n.userData.isPortal ? 10 : 14;
          if (player.position.distanceTo(n.position) < interactDist) {
            target = n;
            break;
          }
        }

        if (isMoving || !target || isInteractionPaused) {
          if (currentTarget) {
            if (currentTarget.userData.isPortal) {
              currentTarget.userData.targetScale = 0.5;
              currentTarget.userData.targetOpacity = 0.5;
            } else {
              currentTarget.userData.targetScale = 1.0;
              currentTarget.userData.targetOpacity = 1.0;
            }
            currentTarget = null;
          }
          stayStartTime = null;
          progressMesh.material.opacity = 0;
          return;
        }

        const now = Date.now();

        if (!stayStartTime) {
          stayStartTime = now;
          currentTarget = target;
          progressMesh.material.opacity = 1;
        } else if (currentTarget !== target) {
          if (currentTarget.userData.isPortal) {
            currentTarget.userData.targetScale = 0.5;
            currentTarget.userData.targetOpacity = 0.5;
          } else {
            currentTarget.userData.targetScale = 1.0;
            currentTarget.userData.targetOpacity = 1.0;
          }
          currentTarget = target;
          stayStartTime = now;
        }

        const elapsed = (now - stayStartTime) / 1000;
        const ratio = Math.min(elapsed / 3.0, 1.0);

        drawProgress(ratio);

        if (currentTarget) {
          if (currentTarget.userData.isPortal) {
            currentTarget.userData.targetScale = 0.5 + 0.05 * ratio;
            currentTarget.userData.targetOpacity = 0.5 - 0.25 * ratio;
          } else {
            currentTarget.userData.targetScale = 1.1;
            currentTarget.userData.targetOpacity = 1.0 - 0.5 * ratio;
          }
        }

        if (elapsed >= 3.0) {
          if (currentTarget.userData.isPortal) {
            switchWorld(currentTarget.userData.dest);
          } else {
            window.open(currentTarget.userData.url, '_blank');
          }

          if (currentTarget.userData.isPortal) {
            currentTarget.userData.targetScale = 0.5;
            currentTarget.userData.targetOpacity = 0.5;
          } else {
            currentTarget.userData.targetScale = 1.0;
            currentTarget.userData.targetOpacity = 1.0;
          }

          stayStartTime = null;
          currentTarget = null;
          progressMesh.material.opacity = 0;
          isInteractionPaused = true;
        }
      }
    </script>
  </body>
</html>
